# Round 1 overrides: simple env, visually highlighted gates
# Gates may be brightly colored (not white); loosen thresholds; less noise

vision:
  # Wider HSV range to catch highlighted/colored gates
  # Override per-team once gate colors are known from interface spec
  hsv_lower: [0, 0, 180]
  hsv_upper: [180, 60, 255]
  min_contour_area: 300.0
  confidence_ema_alpha: 0.4   # respond faster in simpler env

state_machine:
  track_confidence_min: 0.3   # lower threshold for high-contrast gates
  approach_aligned_min: 0.65

sim:
  noise_std: 2.0              # R1 is visually simpler
  exposure_variation: 0.0
