adapter:
  type: "mock"

sim:
  fps: 60
  seed: 42
  resolution: [480, 640]
  total_gates: 10
  lateral_std: 0.15
  noise_std: 5.0
  accel_noise_std: 0.1
  gyro_noise_std: 0.02
  drop_frame_prob: 0.0
  latency_spike_prob: 0.0
  max_latency_ms: 20.0
  exposure_variation: 0.0

pipeline:
  total_budget_ms: 15.0
  warn_budget_ms: 10.0

lobes:
  vision:    {budget_ms: 8.0}
  stability: {budget_ms: 2.0}
  progress:  {budget_ms: 2.0}
  recovery:  {budget_ms: 1.0}
  risk:      {budget_ms: 1.0}

vision:
  resize_h: 240
  resize_w: 320
  hsv_lower: [0, 0, 200]
  hsv_upper: [180, 30, 255]
  min_contour_area: 500.0
  confidence_ema_alpha: 0.3
  confidence_decay_rate: 2.0

stability:
  gyro_tumble_threshold: 8.0
  accel_high_threshold: 20.0
  spike_window_s: 0.5

progress:
  area_ema_alpha: 0.3
  min_progress_rate: 0.02

recovery:
  lost_gate_s: 0.5
  recovery_penalty_window: 2.0

risk:
  push_level_thresholds: [0.8, 0.6, 0.35]
  max_recovery_penalty: 0.3
  spike_penalty_weight: 0.05

state_machine:
  track_confidence_min: 0.4
  approach_aligned_min: 0.7
  min_stable: 0.5
  hysteresis_factor: 0.8
  commit_area_threshold: 40000.0
  search_timeout_s: 3.0
  approach_timeout_s: 2.0

controller:
  integral_clamp: 0.3
  push_throttle_step: 0.03
  profiles:
    SEARCH:
      yaw_kp: 0.7
      yaw_ki: 0.0
      yaw_kd: 0.02
      pitch_kp: 0.2
      pitch_ki: 0.0
      pitch_kd: 0.01
      roll_kp: 0.2
      roll_ki: 0.0
      roll_kd: 0.01
      throttle: 0.4
    TRACK:
      yaw_kp: 0.5
      yaw_ki: 0.01
      yaw_kd: 0.02
      pitch_kp: 0.4
      pitch_ki: 0.01
      pitch_kd: 0.02
      roll_kp: 0.3
      roll_ki: 0.0
      roll_kd: 0.01
      throttle: 0.5
    APPROACH:
      yaw_kp: 0.4
      yaw_ki: 0.01
      yaw_kd: 0.02
      pitch_kp: 0.6
      pitch_ki: 0.01
      pitch_kd: 0.02
      roll_kp: 0.3
      roll_ki: 0.0
      roll_kd: 0.01
      throttle: 0.65
    COMMIT:
      yaw_kp: 0.2
      yaw_ki: 0.0
      yaw_kd: 0.01
      pitch_kp: 0.8
      pitch_ki: 0.0
      pitch_kd: 0.01
      roll_kp: 0.2
      roll_ki: 0.0
      roll_kd: 0.01
      throttle: 0.85
    RECOVER:
      yaw_kp: 0.8
      yaw_ki: 0.0
      yaw_kd: 0.03
      pitch_kp: 0.1
      pitch_ki: 0.0
      pitch_kd: 0.01
      roll_kp: 0.1
      roll_ki: 0.0
      roll_kd: 0.01
      throttle: 0.35

logging:
  output_dir: "logs/"
  flush_every_n_steps: 1
  save_video_snippets: false
